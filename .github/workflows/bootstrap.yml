name: Bootstrap A+Pay Platform

on:
  push:
    branches: [agent/build-apluspay-platform]

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Materialize platform source
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/chunk*.b64 | base64 -d > /tmp/apluspay.tgz
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/apluspay.tgz -C .
          rm -f .github/workflows/bootstrap.yml
      - name: Commit generated platform
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Build multi-tenant A+Pay platform'
          git push origin HEAD:agent/build-apluspay-platform
