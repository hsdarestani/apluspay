name: Force A+Pay Origin Online

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: apluspay-production
  cancel-in-progress: false

jobs:
  repair:
    if: github.event.issue.title == 'force-apluspay-origin' && github.actor == github.repository_owner
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSHPASS: ${{ secrets.PASS }}
      DOMAIN: pay.smarbiz.sbs
    steps:
      - name: Install SSH client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update >/dev/null
          sudo apt-get install -y sshpass >/dev/null
          install -m 700 -d ~/.ssh
          ssh-keyscan -H -p 22 "$SSH_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Configure dedicated A+Pay origin
        id: origin
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p 22 root@"$SSH_HOST" \
            "DOMAIN='$DOMAIN' bash -se" <<'REMOTE' | tee /tmp/origin-result.txt
          set -Eeuo pipefail
          export DEBIAN_FRONTEND=noninteractive

          apt-get update
          apt-get install -y nginx certbot openssl curl
          systemctl enable --now nginx

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8020/health/ >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "A+Pay application is not healthy on 127.0.0.1:8020"
              cd /root/apluspay && docker compose ps && docker compose logs --tail=200 web
              exit 1
            fi
            sleep 2
          done

          mkdir -p /var/www/certbot/.well-known/acme-challenge
          mkdir -p /etc/ssl/apluspay

          if [ ! -s /etc/ssl/apluspay/fullchain.pem ] || [ ! -s /etc/ssl/apluspay/privkey.pem ]; then
            openssl req -x509 -nodes -newkey rsa:2048 -days 365 \
              -keyout /etc/ssl/apluspay/privkey.pem \
              -out /etc/ssl/apluspay/fullchain.pem \
              -subj "/CN=$DOMAIN" \
              -addext "subjectAltName=DNS:$DOMAIN" >/dev/null 2>&1
            chmod 600 /etc/ssl/apluspay/privkey.pem
          fi

          rm -f /etc/nginx/sites-enabled/default
          rm -f /etc/nginx/sites-enabled/apluspay.conf
          rm -f /etc/nginx/conf.d/apluspay.conf

          for item in /etc/nginx/sites-enabled/* /etc/nginx/conf.d/*.conf; do
            [ -e "$item" ] || continue
            if grep -Fq "$DOMAIN" "$item" 2>/dev/null; then
              rm -f "$item"
            fi
          done

          cat > /etc/nginx/conf.d/apluspay.conf <<'NGINX'
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name pay.smarbiz.sbs _;

              client_max_body_size 20M;

              location ^~ /.well-known/acme-challenge/ {
                  root /var/www/certbot;
                  default_type text/plain;
                  try_files $uri =404;
              }

              location / {
                  proxy_pass http://127.0.0.1:8020;
                  proxy_set_header Host pay.smarbiz.sbs;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 90;
              }
          }

          server {
              listen 443 ssl http2 default_server;
              listen [::]:443 ssl http2 default_server;
              server_name pay.smarbiz.sbs _;

              ssl_certificate /etc/ssl/apluspay/fullchain.pem;
              ssl_certificate_key /etc/ssl/apluspay/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_session_cache shared:APaySSL:10m;

              client_max_body_size 20M;

              location / {
                  proxy_pass http://127.0.0.1:8020;
                  proxy_set_header Host pay.smarbiz.sbs;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
                  proxy_read_timeout 90;
              }
          }
          NGINX

          if command -v ufw >/dev/null 2>&1; then
            ufw allow 80/tcp >/dev/null 2>&1 || true
            ufw allow 443/tcp >/dev/null 2>&1 || true
          fi

          nginx -t
          systemctl reload nginx

          test "$(curl --fail --silent --show-error -H "Host: $DOMAIN" http://127.0.0.1/health/)" = '{"status": "ok", "service": "apluspay"}'
          curl --fail --silent --show-error --insecure \
            --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/health/" >/dev/null

          challenge="apluspay-$(date +%s)"
          printf '%s' "$challenge" > "/var/www/certbot/.well-known/acme-challenge/$challenge"
          test "$(curl --fail --silent --show-error -H "Host: $DOMAIN" "http://127.0.0.1/.well-known/acme-challenge/$challenge")" = "$challenge"
          rm -f "/var/www/certbot/.well-known/acme-challenge/$challenge"

          certbot_output="$(mktemp)"
          if certbot certonly \
            --webroot \
            --webroot-path /var/www/certbot \
            --non-interactive \
            --agree-tos \
            --register-unsafely-without-email \
            --keep-until-expiring \
            -d "$DOMAIN" >"$certbot_output" 2>&1; then
            sed -i \
              -e "s#/etc/ssl/apluspay/fullchain.pem#/etc/letsencrypt/live/$DOMAIN/fullchain.pem#g" \
              -e "s#/etc/ssl/apluspay/privkey.pem#/etc/letsencrypt/live/$DOMAIN/privkey.pem#g" \
              /etc/nginx/conf.d/apluspay.conf
            nginx -t
            systemctl reload nginx
            certificate_source=letsencrypt
          else
            certificate_source=self-signed-fallback
            echo "Certbot did not issue a certificate; keeping temporary origin TLS."
            tail -n 30 "$certbot_output"
          fi

          echo "certificate_source=$certificate_source"
          echo "listening_ports:"
          ss -ltn | grep -E ':80 |:443 |:8020 '
          echo "local_http=$(curl --silent --output /dev/null --write-out '%{http_code}' -H "Host: $DOMAIN" http://127.0.0.1/health/)"
          echo "local_https=$(curl --insecure --silent --output /dev/null --write-out '%{http_code}' --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/health/")"
          REMOTE

          {
            echo 'origin_result<<APAYEOF'
            tail -c 6000 /tmp/origin-result.txt
            echo
            echo 'APAYEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Verify through Cloudflare
        id: public
        shell: bash
        run: |
          set +e
          rm -f /tmp/public-body /tmp/public-error
          for attempt in $(seq 1 24); do
            metrics=$(curl -sS \
              --connect-timeout 10 --max-time 25 \
              -o /tmp/public-body \
              -w 'http_code=%{http_code} remote_ip=%{remote_ip} ssl_verify=%{ssl_verify_result} time_total=%{time_total}' \
              "https://$DOMAIN/health/" 2>/tmp/public-error)
            result=$?
            body=$(head -c 500 /tmp/public-body 2>/dev/null | tr '\n' ' ')
            error=$(head -c 500 /tmp/public-error 2>/dev/null | tr '\n' ' ')
            echo "attempt=$attempt exit=$result $metrics body=$body error=$error"
            if [ "$result" -eq 0 ] && echo "$metrics" | grep -q 'http_code=200' && echo "$body" | grep -q 'apluspay'; then
              diagnostic="attempt=$attempt exit=$result $metrics body=$body"
              echo "diagnostic=$diagnostic" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5
          done
          diagnostic="exit=$result $metrics body=$body error=$error"
          echo "diagnostic=$diagnostic" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Report final result
        if: always()
        uses: actions/github-script@v7
        env:
          ORIGIN_RESULT: ${{ steps.origin.outputs.origin_result }}
          PUBLIC_RESULT: ${{ steps.public.outputs.diagnostic }}
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const headline = success
              ? '✅ A+Pay production is online and healthy.'
              : '❌ A+Pay origin was configured, but public verification is not yet healthy.';
            const body = `${headline}\n\n### Origin\n\`\`\`text\n${process.env.ORIGIN_RESULT || 'Origin step did not return output.'}\n\`\`\`\n\n### Public\n\`\`\`text\n${process.env.PUBLIC_RESULT || 'Public verification did not return output.'}\n\`\`\`\n\n${runUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
