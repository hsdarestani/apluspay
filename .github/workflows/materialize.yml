name: Materialize A+Pay Platform

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  materialize:
    if: github.event.issue.title == 'bootstrap-apluspay-platform'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/build-apluspay-platform
          fetch-depth: 0
      - name: Materialize platform source
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/chunk*.b64 | base64 -d > /tmp/apluspay.tgz
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/apluspay.tgz -C .
      - name: Commit platform source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Build multi-tenant A+Pay platform'
          git push origin HEAD:agent/build-apluspay-platform
