name: Apply and Validate Central A+Pay Upgrade

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event.issue.title == 'apply-apluspay-central-upgrade' && github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/central-vendor-platform
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Rebuild source when payload exists
        id: rebuild
        shell: bash
        run: |
          set +e
          if [ -f tools/apply_central_upgrade.py ]; then
            python tools/apply_central_upgrade.py > /tmp/rebuild.log 2>&1
            result=$?
          else
            echo 'Central platform source is already rebuilt on this branch.' > /tmp/rebuild.log
            result=0
          fi
          cat /tmp/rebuild.log
          {
            echo 'diagnostic<<APAYEOF'
            tail -c 5000 /tmp/rebuild.log
            echo
            echo 'APAYEOF'
          } >> "$GITHUB_OUTPUT"
          exit "$result"

      - name: Commit rebuilt source when changed
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m 'Build central multi-vendor A+Pay experience'
            git push origin HEAD:agent/central-vendor-platform
          else
            echo 'No source reconstruction changes to commit.'
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate migrations and application
        id: validate
        env:
          DJANGO_DEBUG: '1'
          DJANGO_SECURE_COOKIES: '0'
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            echo '### compileall'
            python -m compileall -q config pay
            echo '### migration drift'
            python manage.py makemigrations --check --dry-run
            echo '### migrate'
            python manage.py migrate --noinput
            echo '### system check'
            python manage.py check
            echo '### tests'
            python manage.py test --verbosity 2
          ) > /tmp/validation.log 2>&1
          result=$?
          cat /tmp/validation.log
          {
            echo 'diagnostic<<APAYEOF'
            tail -c 12000 /tmp/validation.log
            echo
            echo 'APAYEOF'
          } >> "$GITHUB_OUTPUT"
          exit "$result"

      - name: Report result
        if: always()
        uses: actions/github-script@v7
        env:
          REBUILD_DIAGNOSTIC: ${{ steps.rebuild.outputs.diagnostic }}
          VALIDATION_DIAGNOSTIC: ${{ steps.validate.outputs.diagnostic }}
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const rebuild = process.env.REBUILD_DIAGNOSTIC ? `\n\n### Rebuild\n\`\`\`text\n${process.env.REBUILD_DIAGNOSTIC}\n\`\`\`` : '';
            const validation = process.env.VALIDATION_DIAGNOSTIC ? `\n\n### Validation\n\`\`\`text\n${process.env.VALIDATION_DIAGNOSTIC}\n\`\`\`` : '';
            const body = ok
              ? `✅ Central multi-vendor upgrade and all validation checks passed.${validation}\n\n${runUrl}`
              : `❌ Central upgrade validation needs fixes.${rebuild}${validation}\n\n${runUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
