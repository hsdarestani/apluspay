name: Apply and Validate Central A+Pay Upgrade

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event.issue.title == 'apply-apluspay-central-upgrade' && github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/central-vendor-platform
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Rebuild atomic source bundle
        run: python tools/apply_central_upgrade.py

      - name: Commit central platform source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Build central multi-vendor A+Pay experience'
          git push origin HEAD:agent/central-vendor-platform

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate migrations and application
        env:
          DJANGO_DEBUG: '1'
          DJANGO_SECURE_COOKIES: '0'
        run: |
          python -m compileall -q config pay
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
          python manage.py check
          python manage.py test

      - name: Report result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = ok
              ? `✅ Central multi-vendor upgrade rebuilt and all validation checks passed.\n\n${runUrl}`
              : `❌ Central upgrade source was rebuilt, but validation needs fixes.\n\n${runUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
