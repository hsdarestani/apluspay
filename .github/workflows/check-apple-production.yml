name: Check A+Pay Apple Production

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  check:
    if: github.event_name != 'issues' || (github.event.issue.title == 'check-apluspay-apple-production' && github.actor == github.repository_owner)
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSHPASS: ${{ secrets.PASS }}
      SSH_USER: root
      SSH_PORT: "22"

    steps:
      - name: Install SSH client
        run: |
          set -euo pipefail
          sudo apt-get update >/dev/null
          sudo apt-get install -y sshpass >/dev/null
          install -m 700 -d ~/.ssh
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Check Apple configuration in production
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -se' <<'REMOTE'
          set -Eeuo pipefail
          cd /root/apluspay
          echo "commit=$(git rev-parse --short HEAD)"
          docker compose ps
          docker compose exec -T web python manage.py shell -c '
          import json
          from django.conf import settings
          from pay.apple_auth import apple_login_is_configured, _client_secret
          result = {
              "configured": apple_login_is_configured(),
              "client_id_present": bool(settings.APPLE_CLIENT_ID),
              "team_id_present": bool(settings.APPLE_TEAM_ID),
              "key_id_present": bool(settings.APPLE_KEY_ID),
              "redirect_uri": settings.APPLE_REDIRECT_URI,
              "private_key_base64_length": len(settings.APPLE_PRIVATE_KEY_BASE64 or ""),
          }
          print(json.dumps(result, ensure_ascii=False))
          token = _client_secret()
          print("client_secret_jwt=ok" if isinstance(token, str) and token.count(".") == 2 else "client_secret_jwt=invalid")
          '
          headers="$(mktemp)"
          status="$(curl -sS -o /dev/null -D "$headers" --max-redirs 0 -w "%{http_code}" https://pay.smarbiz.sbs/accounts/apple/)"
          echo "apple_start_status=$status"
          tr -d '\r' < "$headers" | awk 'tolower($1) == "location:" {print "location=" substr($0, index($0,$2)); exit}'
          rm -f "$headers"
          REMOTE
