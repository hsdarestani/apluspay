name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  django:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python manage.py migrate --noinput
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECURE_COOKIES: "0"
      - run: python manage.py test
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECURE_COOKIES: "0"
