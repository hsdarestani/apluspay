name: Repair A+Pay Origin TLS

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: apluspay-production
  cancel-in-progress: false

jobs:
  repair:
    if: github.event.issue.title == 'repair-apluspay-origin' && github.actor == github.repository_owner
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSHPASS: ${{ secrets.PASS }}
      DOMAIN: pay.smarbiz.sbs
      APP_DIR: /root/apluspay
    steps:
      - name: Install SSH client
        run: |
          sudo apt-get update >/dev/null
          sudo apt-get install -y sshpass >/dev/null
          install -m 700 -d ~/.ssh
          ssh-keyscan -H -p 22 "$SSH_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Repair Nginx and origin TLS
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p 22 root@"$SSH_HOST" \
            "DOMAIN='$DOMAIN' APP_DIR='$APP_DIR' bash -se" <<'REMOTE'
          set -Eeuo pipefail
          export DEBIAN_FRONTEND=noninteractive

          apt-get update
          apt-get install -y nginx certbot openssl curl
          mkdir -p /var/www/certbot/.well-known/acme-challenge
          mkdir -p /etc/ssl/apluspay

          if [ ! -s /etc/ssl/apluspay/fullchain.pem ] || [ ! -s /etc/ssl/apluspay/privkey.pem ]; then
            openssl req -x509 -nodes -newkey rsa:2048 -days 365 \
              -keyout /etc/ssl/apluspay/privkey.pem \
              -out /etc/ssl/apluspay/fullchain.pem \
              -subj "/CN=$DOMAIN" \
              -addext "subjectAltName=DNS:$DOMAIN"
            chmod 600 /etc/ssl/apluspay/privkey.pem
          fi

          cat > /etc/nginx/sites-available/apluspay.conf <<NGINX_HTTP
          server {
              listen 80;
              listen [::]:80;
              server_name $DOMAIN;

              location ^~ /.well-known/acme-challenge/ {
                  root /var/www/certbot;
                  default_type text/plain;
              }

              location / {
                  proxy_pass http://127.0.0.1:8020;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 90;
              }
          }
          NGINX_HTTP

          for enabled in /etc/nginx/sites-enabled/*; do
            [ -e "$enabled" ] || continue
            [ "$enabled" = "/etc/nginx/sites-enabled/apluspay.conf" ] && continue
            target="$(readlink -f "$enabled" 2>/dev/null || printf '%s' "$enabled")"
            if grep -Fq "$DOMAIN" "$target" 2>/dev/null; then
              rm -f "$enabled"
            fi
          done

          ln -sfn /etc/nginx/sites-available/apluspay.conf /etc/nginx/sites-enabled/apluspay.conf
          nginx -t
          systemctl enable --now nginx
          systemctl reload nginx

          curl --fail --silent --show-error -H "Host: $DOMAIN" http://127.0.0.1/health/

          challenge="apluspay-$(date +%s)"
          printf '%s' "$challenge" > "/var/www/certbot/.well-known/acme-challenge/$challenge"
          test "$(curl --fail --silent --show-error -H "Host: $DOMAIN" "http://127.0.0.1/.well-known/acme-challenge/$challenge")" = "$challenge"
          rm -f "/var/www/certbot/.well-known/acme-challenge/$challenge"

          certbot certonly \
            --webroot \
            --webroot-path /var/www/certbot \
            --non-interactive \
            --agree-tos \
            --register-unsafely-without-email \
            --keep-until-expiring \
            -d "$DOMAIN" || true

          if [ -s "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" ] && [ -s "/etc/letsencrypt/live/$DOMAIN/privkey.pem" ]; then
            CERT_FILE="/etc/letsencrypt/live/$DOMAIN/fullchain.pem"
            KEY_FILE="/etc/letsencrypt/live/$DOMAIN/privkey.pem"
          else
            CERT_FILE="/etc/ssl/apluspay/fullchain.pem"
            KEY_FILE="/etc/ssl/apluspay/privkey.pem"
          fi

          cat > /etc/nginx/sites-available/apluspay.conf <<NGINX_TLS
          server {
              listen 80;
              listen [::]:80;
              server_name $DOMAIN;

              location ^~ /.well-known/acme-challenge/ {
                  root /var/www/certbot;
                  default_type text/plain;
              }

              location / {
                  proxy_pass http://127.0.0.1:8020;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 90;
              }
          }

          server {
              listen 443 ssl http2;
              listen [::]:443 ssl http2;
              server_name $DOMAIN;

              ssl_certificate $CERT_FILE;
              ssl_certificate_key $KEY_FILE;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_session_cache shared:APaySSL:10m;

              location / {
                  proxy_pass http://127.0.0.1:8020;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
                  proxy_read_timeout 90;
              }
          }
          NGINX_TLS

          if command -v ufw >/dev/null 2>&1; then
            ufw allow 80/tcp >/dev/null 2>&1 || true
            ufw allow 443/tcp >/dev/null 2>&1 || true
          fi

          nginx -t
          systemctl reload nginx
          ss -ltn | grep -E ':80 |:443 '
          curl --fail --silent --show-error -H "Host: $DOMAIN" http://127.0.0.1/health/
          curl --fail --silent --show-error --insecure --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/health/"
          REMOTE

      - name: Verify Cloudflare endpoint
        id: verify
        shell: bash
        run: |
          set +e
          error_file="$(mktemp)"
          metrics=$(curl -sS --retry 15 --retry-delay 5 --retry-all-errors \
            --connect-timeout 10 --max-time 120 \
            -o /tmp/health-body \
            -w 'http_code=%{http_code} remote_ip=%{remote_ip} ssl_verify=%{ssl_verify_result} time_total=%{time_total}' \
            "https://$DOMAIN/health/" 2>"$error_file")
          result=$?
          error_text=$(tr '\n' ' ' < "$error_file" | head -c 800)
          body=$(head -c 500 /tmp/health-body 2>/dev/null | tr '\n' ' ')
          diagnostic="exit=$result $metrics error=$error_text body=$body"
          echo "$diagnostic"
          echo "diagnostic=$diagnostic" >> "$GITHUB_OUTPUT"
          exit "$result"

      - name: Report repair result
        if: always()
        uses: actions/github-script@v7
        env:
          DIAGNOSTIC: ${{ steps.verify.outputs.diagnostic }}
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = success
              ? `✅ Origin TLS repaired and A+Pay is publicly healthy.\n\n- https://pay.smarbiz.sbs/\n- https://pay.smarbiz.sbs/health/\n- ${process.env.DIAGNOSTIC}\n- ${runUrl}`
              : `❌ Origin repair did not fully pass public verification.\n\n- ${process.env.DIAGNOSTIC || 'No public diagnostic was produced.'}\n- ${runUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
