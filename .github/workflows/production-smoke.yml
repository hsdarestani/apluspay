name: A+Pay-Produktion prüfen

on:
  workflow_run:
    workflows: ["Deploy A+Pay Production"]
    types: [completed]
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: apluspay-production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'issues' && github.event.issue.title == 'smoke-apluspay-production' && github.actor == github.repository_owner)
    runs-on: ubuntu-latest
    steps:
      - name: Öffentliche Kernabläufe prüfen
        id: smoke
        shell: bash
        run: |
          set +e
          base='https://pay.smarbiz.sbs'

          public_check() {
            local path="$1"
            local expected="$2"
            local output
            output="$(mktemp)"
            curl --fail --silent --show-error \
              --retry 24 --retry-delay 5 --retry-all-errors \
              --connect-timeout 10 --max-time 40 \
              "$base$path" -o "$output"
            grep -Fq "$expected" "$output"
            printf '%-36s HTTP 200 · Inhalt geprüft (%s Byte)\n' "$path" "$(wc -c < "$output")"
          }

          protected_check() {
            local path="$1"
            local headers body code
            headers="$(mktemp)"
            body="$(mktemp)"
            code="$(curl --silent --show-error \
              --retry 24 --retry-delay 5 --retry-all-errors \
              --connect-timeout 10 --max-time 40 \
              -D "$headers" -o "$body" -w '%{http_code}' "$base$path")"
            test "$code" = '302'
            grep -Eqi '^location: .*/accounts/login/' "$headers"
            printf '%-36s HTTP 302 · Anmeldeschutz geprüft\n' "$path"
          }

          (
            set -euo pipefail
            public_check '/health/' '"service": "apluspay"'
            public_check '/' 'DIE ZENTRALE ZAHLUNGS- UND TREUE-APP'
            public_check '/accounts/login/' 'Mit Apple fortfahren'
            public_check '/accounts/login/' '<title>Anmelden · A+Pay</title>'
            public_check '/accounts/register/' 'Mit Apple fortfahren'
            public_check '/accounts/register/' 'WILLKOMMEN BEI A+PAY'
            protected_check '/vendors/'
            public_check '/sw.js' 'CACHE'
            public_check '/static/pay/manifest.webmanifest' 'Ein Konto für Guthaben'
          ) > /tmp/smoke.log 2>&1
          result=$?
          cat /tmp/smoke.log

          {
            echo 'result<<APAYEOF'
            cat /tmp/smoke.log
            echo 'APAYEOF'
          } >> "$GITHUB_OUTPUT"
          exit "$result"

      - name: Angefordertes Prüfergebnis melden
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          RESULT: ${{ steps.smoke.outputs.result }}
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const details = process.env.RESULT ? `\n\n\`\`\`text\n${process.env.RESULT}\n\`\`\`` : '';
            const body = success
              ? `✅ Die Produktionsprüfung der deutschen Oberfläche und der Apple-Anmeldung war erfolgreich.${details}\n\n${runUrl}`
              : `❌ Die Produktionsprüfung ist fehlgeschlagen.${details}\n\n${runUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
