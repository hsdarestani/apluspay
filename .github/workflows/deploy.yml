name: Deploy A+Pay Production

on:
  push:
    branches: [main]
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: apluspay-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'issues' || (github.event.issue.title == 'deploy-apluspay-production' && github.actor == github.repository_owner)
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSHPASS: ${{ secrets.PASS }}
      SSH_USER: root
      SSH_PORT: "22"
      APP_DIR: /root/apluspay
      DOMAIN: pay.smarbiz.sbs
      APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_PRIVATE_KEY_INPUT: ${{ secrets.APPLE_PRIVATE_KEY_BASE64 }}

    steps:
      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SSH_HOST" || (echo "HOST secret is missing" && exit 1)
          test -n "$SSHPASS" || (echo "PASS secret is missing" && exit 1)
          test -n "$APPLE_CLIENT_ID" || (echo "APPLE_CLIENT_ID secret is missing" && exit 1)
          test -n "$APPLE_TEAM_ID" || (echo "APPLE_TEAM_ID secret is missing" && exit 1)
          test -n "$APPLE_KEY_ID" || (echo "APPLE_KEY_ID secret is missing" && exit 1)
          test -n "$APPLE_PRIVATE_KEY_INPUT" || (echo "APPLE_PRIVATE_KEY_BASE64 secret is missing" && exit 1)

      - name: Normalize and validate Apple private key
        shell: bash
        run: |
          set -euo pipefail
          if printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | grep -q -- '-----BEGIN PRIVATE KEY-----'; then
            APPLE_PRIVATE_KEY_NORMALIZED="$(printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | tr -d '\r' | base64 -w0)"
          else
            APPLE_PRIVATE_KEY_NORMALIZED="$(printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | tr -d '\r\n ')"
          fi

          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s' "$APPLE_PRIVATE_KEY_NORMALIZED" | base64 --decode > "$key_file" 2>/dev/null || {
            echo "APPLE_PRIVATE_KEY_BASE64 is neither a raw .p8 key nor valid Base64."
            exit 1
          }
          grep -q -- '-----BEGIN PRIVATE KEY-----' "$key_file" || {
            echo "The decoded Apple key has no private-key header."
            exit 1
          }
          openssl pkey -in "$key_file" -noout >/dev/null 2>&1 || {
            echo "The Apple .p8 private key cannot be parsed by OpenSSL."
            exit 1
          }
          echo "APPLE_PRIVATE_KEY_NORMALIZED=$APPLE_PRIVATE_KEY_NORMALIZED" >> "$GITHUB_ENV"
          echo "Apple .p8 key format is valid."

      - name: Install SSH client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update >/dev/null
          sudo apt-get install -y sshpass >/dev/null
          install -m 700 -d ~/.ssh
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy and validate Apple login
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "APP_DIR='$APP_DIR' DOMAIN='$DOMAIN' REPOSITORY='https://github.com/${GITHUB_REPOSITORY}.git' APPLE_CLIENT_ID='$APPLE_CLIENT_ID' APPLE_TEAM_ID='$APPLE_TEAM_ID' APPLE_KEY_ID='$APPLE_KEY_ID' APPLE_PRIVATE_KEY_BASE64='$APPLE_PRIVATE_KEY_NORMALIZED' bash -se" <<'REMOTE'
          set -Eeuo pipefail
          cd "$APP_DIR"
          git fetch --prune origin main
          git checkout -B main origin/main
          git reset --hard origin/main

          if [ -f .env ]; then
            awk '/^[A-Za-z_][A-Za-z0-9_]*=/{print; next} /^[[:space:]]*($|#)/{print}' .env > .env.cleaned
            mv .env.cleaned .env
          else
            touch .env
          fi

          upsert_env() {
            key="$1"
            value="$2"
            escaped="$(printf '%s' "$value" | sed 's/[&|]/\\&/g')"
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${escaped}|" .env
            else
              printf '%s=%s\n' "$key" "$value" >> .env
            fi
          }

          upsert_env APPLE_CLIENT_ID "$APPLE_CLIENT_ID"
          upsert_env APPLE_TEAM_ID "$APPLE_TEAM_ID"
          upsert_env APPLE_KEY_ID "$APPLE_KEY_ID"
          upsert_env APPLE_PRIVATE_KEY_BASE64 "$APPLE_PRIVATE_KEY_BASE64"
          upsert_env APPLE_REDIRECT_URI "https://$DOMAIN/accounts/apple/callback/"
          chmod 600 .env

          docker compose up -d --build --remove-orphans
          for attempt in $(seq 1 40); do
            if curl --fail --silent --show-error http://127.0.0.1:8020/health/ >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 40 ]; then
              docker compose ps
              docker compose logs --tail=250 web
              exit 1
            fi
            sleep 3
          done

          docker compose exec -T web python manage.py shell -c \
            'from pay.apple_auth import apple_login_is_configured, _client_secret; assert apple_login_is_configured(), "Apple settings are incomplete"; token = _client_secret(); assert isinstance(token, str) and token.count(".") == 2, "Apple client secret JWT is invalid"; print("Apple-Anmeldung: vollständig konfiguriert; Client-Secret erfolgreich erzeugt")'
          REMOTE

      - name: Verify public Apple authorization redirect
        shell: bash
        run: |
          set -euo pipefail
          headers="$(mktemp)"
          body="$(mktemp)"
          trap 'rm -f "$headers" "$body"' EXIT

          status="$(curl --silent --show-error --output "$body" --dump-header "$headers" --max-redirs 0 --write-out '%{http_code}' "https://$DOMAIN/accounts/apple/")"
          test "$status" = "302" || {
            echo "Expected HTTP 302 from the Apple login start route, received $status."
            cat "$headers"
            exit 1
          }
          location="$(tr -d '\r' < "$headers" | awk 'tolower($1) == "location:" {$1=""; sub(/^ /, ""); print; exit}')"

          python - "$location" "$APPLE_CLIENT_ID" "https://$DOMAIN/accounts/apple/callback/" <<'PY'
          import sys
          from urllib.parse import parse_qs, urlparse

          location, expected_client_id, expected_redirect = sys.argv[1:]
          parsed = urlparse(location)
          params = parse_qs(parsed.query)
          assert parsed.scheme == "https" and parsed.netloc == "appleid.apple.com"
          assert parsed.path == "/auth/authorize"
          assert params.get("client_id") == [expected_client_id]
          assert params.get("redirect_uri") == [expected_redirect]
          assert params.get("response_type") == ["code"]
          assert params.get("response_mode") == ["form_post"]
          assert params.get("scope") == ["name email"]
          assert params.get("state", [""])[0]
          assert params.get("nonce", [""])[0]
          print("A+Pay redirects to Apple with the expected client and callback URL.")
          PY

          apple_status="$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' --connect-timeout 15 --max-time 45 "$location")"
          case "$apple_status" in
            200|302) echo "Apple authorization endpoint is reachable (HTTP $apple_status)." ;;
            *) echo "Apple authorization endpoint rejected the request (HTTP $apple_status)."; exit 1 ;;
          esac

      - name: Verify public health endpoint
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --retry 15 --retry-delay 5 --retry-all-errors \
            --connect-timeout 10 --max-time 120 \
            "https://$DOMAIN/health/"

      - name: Report deployment result
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = status === 'success'
              ? `✅ Die Produktionsbereitstellung und Apple-Anmeldung wurden erfolgreich geprüft.\n\n- Anwendung: https://pay.smarbiz.sbs/\n- Apple-Anmeldung: https://pay.smarbiz.sbs/accounts/apple/\n- Systemstatus: https://pay.smarbiz.sbs/health/\n- Ablauf: ${runUrl}`
              : `❌ Die Produktionsbereitstellung oder Apple-Prüfung ist fehlgeschlagen. Protokoll: ${runUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });